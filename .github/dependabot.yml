version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Phoenix"
    open-pull-requests-limit: 5
    groups:
      spring-dependencies:
        patterns:
          - "org.springframework*"
          - "org.springframework.boot*"
          - "org.springframework.security*"
      database-drivers:
        patterns:
          - "com.mysql:*"
          - "com.h2database:*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
      timezone: "America/Phoenix"
    open-pull-requests-limit: 5
